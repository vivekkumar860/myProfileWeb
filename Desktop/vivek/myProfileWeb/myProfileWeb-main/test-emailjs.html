<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test EmailJS Configuration</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .config-info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .config-info h2 {
            margin-top: 0;
        }
        .config-item {
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            font-family: monospace;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #console {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="config-info">
        <h2>EmailJS Configuration</h2>
        <div class="config-item">Service ID: service_g6jiupf</div>
        <div class="config-item">Template ID: template_er2i37j</div>
        <div class="config-item">Public Key: IAVjyo3oGet_ZQ8DP</div>
    </div>

    <form id="test-form">
        <h2>Test Email Form</h2>
        <input type="text" name="from_name" placeholder="Your Name" value="Test User" required>
        <input type="email" name="from_email" placeholder="Your Email" value="test@example.com" required>
        <input type="text" name="subject" placeholder="Subject" value="Test Email from Portfolio" required>
        <textarea name="message" placeholder="Your Message" rows="4" required>This is a test message to verify EmailJS configuration.</textarea>
        <button type="submit">Send Test Email</button>
    </form>

    <div id="status"></div>
    <div id="console">
        <div class="log-entry">Console output will appear here...</div>
    </div>

    <script>
        // Configuration
        const EMAILJS_PUBLIC_KEY = 'IAVjyo3oGet_ZQ8DP';
        const EMAILJS_SERVICE_ID = 'service_g6jiupf';
        const EMAILJS_TEMPLATE_ID = 'template_er2i37j';

        // Console logging
        const logConsole = document.getElementById('console');
        function addLog(message, data = null) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            if (data) {
                entry.textContent += ' ' + JSON.stringify(data, null, 2);
            }
            logConsole.appendChild(entry);
            logConsole.scrollTop = logConsole.scrollHeight;
            console.log(message, data || '');
        }

        // Initialize EmailJS
        addLog('Initializing EmailJS...');
        try {
            emailjs.init(EMAILJS_PUBLIC_KEY);
            addLog('✓ EmailJS initialized with public key: ' + EMAILJS_PUBLIC_KEY);
        } catch (e) {
            addLog('✗ Failed to initialize EmailJS:', e.message);
        }

        // Form submission
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Sending...';
            statusDiv.className = '';

            addLog('Preparing to send email...');
            addLog('Form data:', {
                from_name: this.from_name.value,
                from_email: this.from_email.value,
                subject: this.subject.value,
                message: this.message.value
            });

            addLog('Using configuration:', {
                service: EMAILJS_SERVICE_ID,
                template: EMAILJS_TEMPLATE_ID
            });

            emailjs.sendForm(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, this)
                .then(function(response) {
                    addLog('✓ SUCCESS!', {
                        status: response.status,
                        text: response.text
                    });
                    statusDiv.textContent = 'Email sent successfully!';
                    statusDiv.className = 'success';
                })
                .catch(function(error) {
                    addLog('✗ FAILED!', {
                        status: error.status,
                        text: error.text,
                        message: error.message,
                        name: error.name
                    });
                    statusDiv.textContent = 'Failed to send email. Check console for details.';
                    statusDiv.className = 'error';
                });
        });

        // Test if EmailJS is loaded
        window.addEventListener('load', function() {
            if (typeof emailjs !== 'undefined') {
                addLog('✓ EmailJS library loaded successfully');
            } else {
                addLog('✗ EmailJS library not loaded!');
            }
        });
    </script>
</body>
</html>
